<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>언제 안 돼?</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #333; }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 언제 안 돼?</h1>
        <p>안 되는 날을 표시해서 시간 맞추는 도구</p>
        <form action="/create" method="POST">
            <input type="text" name="title" placeholder="약속 이름 (예: 동아리 회식)" required>
            <button type="submit">새 약속 만들기</button>
        </form>
    </div>
</body>
</html>
