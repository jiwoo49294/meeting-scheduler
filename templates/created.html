<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>약속 생성됨</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #333; }
        .link-box {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
        }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ 약속이 만들어졌어!</h1>
        <p><strong>{{ title }}</strong></p>
        <p>아래 링크를 친구들한테 보내줘:</p>
        <div class="link-box" id="link">{{ link }}</div>
        <button onclick="copyLink()">링크 복사하기</button>
        <p><a href="{{ link }}">→ 내가 먼저 입력하러 가기</a></p>
    </div>
    <script>
        function copyLink() {
            const link = document.getElementById('link').innerText;
            navigator.clipboard.writeText(link);
            alert('링크 복사됨!');
        }
    </script>
</body>
</html>
